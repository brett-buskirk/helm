# DigitalOcean App Platform spec for the Helm PWA.
#
# Helm is a local-first, single-user app: this deploys ONLY the static app
# shell to DO's CDN. All data lives in the browser's IndexedDB on the user's
# machine and never touches this host (see docs/adr/0001).
#
# How updates ship: `deploy_on_push` redeploys whenever `main` advances. `main`
# is branch-protected, so only merged (CI-green) code ever reaches it — the
# existing PR gates already guard what deploys. No CI secrets or doctl needed.
#
# One-time provisioning and the alternatives are documented in docs/DEPLOY.md.
name: helm
region: nyc
static_sites:
  - name: web
    github:
      repo: brett-buskirk/helm
      branch: main
      deploy_on_push: true
    # `npm ci` + this build command run in DO's Node buildpack (Node pinned via
    # package.json "engines"). Output is Vite's dist/.
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    # Hash routing means every route is served from index.html at `/`, so a
    # catchall isn't strictly required — set here so any stray deep path still
    # resolves to the app instead of a 404.
    catchall_document: index.html
